name: Deploy Shader Player to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate shaders
        run: |
          # explicit validation step so failures are obvious in logs
          bash validate.sh

      - name: Run build
        run: |
          # build.sh also validates, but we already validated above
          bash build.sh

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # publish the contents of the distribution directory, not the raw player folder
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
