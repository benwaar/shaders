<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GLSL Player</title>
  <script>
    const inPlayerDir = window.location.pathname.includes('/player/');
    const repoBase = inPlayerDir ? '../' : './';

    const link = document.createElement('link');
    link.rel = 'stylesheet';
    link.href = repoBase + 'assets/player.css';
    document.head.appendChild(link);
  </script>
</head>
<body>
  <div id="view">
    <canvas id="c"></canvas>
  </div>

  <div id="panel">
    <div class="mono">GLSL Player</div>

    <label for="shaderSelect">Shader</label>
    <select id="shaderSelect"></select>

    <div id="imageSelectGroup">
      <label for="imageSelect">Image</label>
      <select id="imageSelect">
        <option value="assets/cassowary.jpg">Cassowary</option>
        <option value="assets/test.png">Test Pattern</option>
      </select>
    </div>

    <div id="fileInputGroup">
      <label>Upload Custom Image</label>
      <input id="fileInput" type="file" accept="image/*" />
    </div>

    <div id="tintGroup" style="display: none;">
      <label for="tint">Tint</label>
      <input id="tint" type="color" value="#ffffff" />
      <div id="tintHint" class="hint"></div>
    </div>

    <div id="strengthGroup" style="display: none;">
      <label for="strength">
        <span id="strengthLabel">Strength</span> <span id="strengthVal" class="mono">0.00</span>
      </label>
      <input id="strength" type="range" min="0" max="1" step="0.01" value="0" />
      <div id="strengthHint" class="hint"></div>
    </div>

    <div id="errors" class="err"></div>

    <div class="footer">
      <a href="https://github.com/benwaar/shaders" target="_blank" rel="noopener">View source on GitHub</a>
    </div>
  </div>

  <script type="module" src="./player.js"></script>
</body>
</html>
